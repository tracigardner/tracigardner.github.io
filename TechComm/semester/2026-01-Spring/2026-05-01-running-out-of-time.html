<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Time vs. Teacher Workload</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

    <link href="../../-css/ptw.css" rel="stylesheet" type="text/css">
    <style>
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            height: 60vh;
            min-height: 420px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <div class="chart-container" style="margin-top: 0px;padding-top: 0px;">
        <canvas id="deadlineChart"></canvas>
        <span style="font-size: 15px;font-family: Verdana, Geneva, Tahoma, sans-serif,"><em>Figure 1. Time Left to Submit Fact Sheets vs. Amount of Work to Submitted</em></span>
    </div>

    <script>
        const ctx = document.getElementById('deadlineChart');

        const labels = [
            'Early Submissions',
            'Target Deadline',
            'End of Grace Period'
        ];

        new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    {
                        label: 'Time Students Have Left',
                        data: [
                            { x: '2026-04-27T23:59:00', y: 100 },
                            { x: '2026-05-01T11:00:00', y: 62 },
                            { x: '2026-05-06T23:59:00', y: 0 }
                        ],
                        borderColor: '#e87722',
                        backgroundColor: '#e87722',
                        borderWidth: 4,
                        tension: 0.45,
                        pointRadius: 5,
                        datalabels: {
                            anchor: 'end',
                            align: function (context) {
                                return context.dataIndex === 2 ? 'left' : 'right';
                            },
                            offset: 6,
                            formatter: function (value, context) {
                                return labels[context.dataIndex] + '\n' + value.y + '%';
                            }
                        }
                    },
                    {
                        label: 'Teacher Workload',
                        data: [
                            { x: '2026-04-27T23:59:00', y: 9.5 },
                            { x: '2026-05-01T11:00:00', y: 29.8 },
                            { x: '2026-05-06T23:59:00', y: 100 }
                        ],
                        borderColor: '#861f41',
                        backgroundColor: '#861f41',
                        borderWidth: 4,
                        tension: 0.45,
                        pointRadius: 5,
                        datalabels: {
                            anchor: 'end',
                            align: function (context) {
                                return context.dataIndex === 2 ? 'left' : 'right';
                            },
                            offset: 6,
                            formatter: function (value, context) {
                                return labels[context.dataIndex] + '\n' + value.y + '%';
                            }
                        }
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        top: 40,
                        right: 120,
                        bottom: 20,
                        left: 30
                    }
                },
                plugins: {
                    title: {
                        display: true,
                        text: 'Time Left to Submit Fact Sheets vs. Amount of Work to Submitted',
                        color: '#861f41',
                        font: {
                            size: '20',
                        },
                        padding: {
                            bottom: 30
                        }
                    },
                    legend: {
                        position: 'bottom'
                    },
                    datalabels: {
                        color: '#000',
                        backgroundColor: 'rgba(229, 225, 230, .75)',
                        borderRadius: 4,
                        padding: {
                            top: 4,
                            bottom: 4,
                            left: 6,
                            right: 6
                        },
                        font: {
                            weight: 'bold'
                        },
                        clamp: true,
                        clip: false
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            tooltipFormat: 'MMM d, yyyy h:mm a'
                        },
                        title: {
                            display: true,
                            text: 'Time Left to Submit Your Work'
                        }
                    },
                    y: {
                        min: 0,
                        max: 100,
                        title: {
                            display: true,
                            text: 'Amount of Work Submitted'
                        },
                        ticks: {
                            callback: value => value + '%'
                        }
                    }
                }
            },
            plugins: [ChartDataLabels]
        });
    </script>
</body>

</html>
